<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriTwin | Precision Login</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        /* CSS STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Natural green to tech-dark gradient */
            background: linear-gradient(135deg, #1e272e 0%, #27ae60 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            padding: 20px;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-box {
            max-width: 400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .header i {
            font-size: 3.5rem;
            color: #2ecc71;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 26px;
            color: #2c3e50;
            letter-spacing: 1px;
        }

        .header h1 span {
            font-size: 10px;
            background: #27ae60;
            color: white;
            padding: 3px 8px;
            border-radius: 5px;
            vertical-align: top;
            margin-left: 5px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #34495e;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .input-group input:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #27ae60;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
            text-decoration: none;
            display: block;
        }

        .login-btn:hover {
            background: #219150;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
        }

        .footer-info {
            margin-top: 30px;
            font-size: 12px;
            color: #95a5a6;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 5px rgba(46, 204, 113, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="header">
                <i class='bx bx-landscape'></i>
                <h1>AGRITWIN <span>CORE</span></h1>
                <p>Digital Twin Control System</p>
            </div>
            
            <form action="home.html">
                <div class="input-group">
                    <label for="username">System Admin</label>
                    <input type="text" id="username" name="username" placeholder="Enter Username" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Access Key</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="login-btn">INITIALIZE TWIN</button>
            </form>
            
            <div class="footer-info">
                <p><span class="status-dot"></span> ESP32 Environmental Node: Connected</p>
            </div>
        </div>
    </div>
</body>
</html>
